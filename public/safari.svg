<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#19D5FF"/>
      <stop offset="100%" stop-color="#1E58F5"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#sg1)" stroke="#fff" stroke-width="1"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <!-- Tick marks around compass -->
  <g stroke="#fff" stroke-width="1.2">
    <line x1="50" y1="4" x2="50" y2="10"/>
    <line x1="50" y1="90" x2="50" y2="96"/>
    <line x1="4" y1="50" x2="10" y2="50"/>
    <line x1="90" y1="50" x2="96" y2="50"/>
  </g>
  <g stroke="rgba(255,255,255,0.5)" stroke-width="0.6">
    <line x1="15.1" y1="15.1" x2="19.3" y2="19.3"/>
    <line x1="80.7" y1="80.7" x2="84.9" y2="84.9"/>
    <line x1="84.9" y1="15.1" x2="80.7" y2="19.3"/>
    <line x1="19.3" y1="80.7" x2="15.1" y2="84.9"/>
  </g>
  <!-- Compass needle -->
  <polygon points="50,14 55,50 50,55" fill="#FF3B30"/>
  <polygon points="50,55 45,50 50,14" fill="#E0352B"/>
  <polygon points="50,86 45,50 50,45" fill="#fff"/>
  <polygon points="50,45 55,50 50,86" fill="#ddd"/>
  <circle cx="50" cy="50" r="3" fill="#fff"/>
</svg>